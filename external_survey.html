<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHMC | External Market Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    boxShadow: { '3xl': '0 20px 50px rgba(0, 0, 0, 0.05)' }
                }
            }
        }
    </script>
    <style>
        .collapsible-content { max-height: 0; overflow: hidden; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        .collapsible-content.open { max-height: 2000px; opacity: 1; margin-bottom: 2rem; }
        input:focus, select:focus, textarea:focus { background-color: white !important; box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 p-3 md:p-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4 md:gap-8">
                <h1 class="font-black text-indigo-600 tracking-tighter text-lg md:text-xl uppercase italic">PHMC</h1>
                <div class="flex gap-4 md:gap-6">
                    <a href="survey.html" class="text-sm font-bold text-slate-400 hover:text-indigo-600 flex items-center gap-1.5 transition-colors uppercase tracking-widest">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                        <span class="hidden md:inline">Internal Survey</span>
                    </a>
                    <a href="external_survey.html" class="text-sm font-bold text-rose-500 flex items-center gap-1.5 transition-colors uppercase tracking-widest border-b-2 border-rose-500">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                        <span class="hidden md:inline">External Survey</span>
                    </a>
                    <a href="reports.html" class="text-sm font-bold text-slate-400 hover:text-indigo-600 flex items-center gap-1.5 transition-colors uppercase tracking-widest">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                        <span class="hidden md:inline">Reports</span>
                    </a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="userDisplay" class="hidden lg:inline text-[10px] font-black text-slate-400 uppercase tracking-widest">...</span>
                <button onclick="supabaseClient.auth.signOut().then(() => window.location.href='index.html')" class="bg-slate-100 text-[10px] font-black px-4 py-2 rounded-full uppercase tracking-widest hover:bg-red-50 hover:text-red-600 transition">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-12">
        <div class="flex justify-between items-end mb-10">
            <div>
                <p class="text-[10px] font-black text-rose-500 uppercase tracking-[0.4em] mb-2">Market Research</p>
                <h2 class="text-4xl font-black text-slate-900 tracking-tight">External Data</h2>
            </div>
            <button id="toggleExtForm" class="group bg-slate-900 text-white p-4 rounded-2xl shadow-2xl hover:bg-rose-600 transition-all active:scale-95 flex items-center gap-3">
                <span id="extBtnIcon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></span>
                <span class="text-xs font-black uppercase tracking-widest px-2" id="extToggleText">Add Entry</span>
            </button>
        </div>

        <form id="externalSurveyForm" class="collapsible-content bg-white rounded-[2.5rem] shadow-3xl border border-slate-100 overflow-hidden">
            <div class="p-8 md:p-12 space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Respondent Age</label>
                        <input type="number" name="age" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-rose-500 outline-none transition-all font-semibold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Gender</label>
                        <select name="gender" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-rose-500 outline-none transition-all font-semibold appearance-none">
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">City / Location</label>
                        <input type="text" name="location" placeholder="Town Name" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-rose-500 outline-none transition-all font-semibold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Occupation</label>
                        <select name="occupation" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-rose-500 outline-none transition-all font-semibold appearance-none">
                            <option value="">Select Occupation</option>
                            <option value="working">Working Professionals</option>
                            <option value="student">Student</option>
                            <option value="pensioner">Pensioner</option>
                            <option value="househusband/housewife">Househusband/Housewife</option>
                            <option value="unemployed">Unemployed</option>
                        </select>
                    </div>
                </div>

                <div class="bg-rose-50/30 p-6 rounded-[2rem] border border-rose-100 space-y-4">
                    <p class="text-[10px] font-black text-rose-500 uppercase tracking-widest text-center">Diagnostic History</p>
                    <p class="text-sm font-bold text-slate-700 text-center px-4">Have you availed of any services from diagnostic clinic/hospital services for the past 6 months?</p>
                    <div class="flex gap-4">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="has_availed_recently" value="true" class="peer hidden" onchange="showDetails()">
                            <div class="p-4 border-2 border-slate-200 rounded-2xl text-center font-black text-xs uppercase text-slate-400 peer-checked:border-rose-500 peer-checked:text-rose-600 bg-white transition-all">Yes</div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="has_availed_recently" value="false" class="peer hidden" onchange="showDetails()">
                            <div class="p-4 border-2 border-slate-200 rounded-2xl text-center font-black text-xs uppercase text-slate-400 peer-checked:border-slate-900 peer-checked:text-white bg-white transition-all">No</div>
                        </label>
                    </div>
                </div>

                <div id="detailsArea" class="hidden space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Specific Details</label>
                    <textarea name="service_details" placeholder="Which hospital/clinic? What services? Why?" rows="3" required class="w-full p-6 bg-slate-50 rounded-[2rem] border-2 border-transparent focus:border-rose-500 outline-none transition-all italic text-slate-600"></textarea>
                </div>

                <button type="submit" id="extSubmitBtn" class="w-full bg-rose-500 text-white font-black uppercase tracking-[0.3em] py-6 rounded-3xl shadow-xl hover:bg-rose-600 transition-all text-sm">
                    Save External Data
                </button>
            </div>
        </form>

        <div class="bg-white rounded-[2.5rem] shadow-3xl border border-slate-100 overflow-hidden">
            <div class="p-8 border-b border-slate-50">
                <h3 class="text-xs font-black text-slate-900 uppercase tracking-widest">Recent Market Entries</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-[10px] uppercase font-black text-slate-400 bg-slate-50/50">
                        <tr>
                            <th class="px-8 py-4">Respondent</th>
                            <th class="px-8 py-4 text-center">Recent Visit</th>
                            <th class="px-8 py-4">Feedback/Details</th>
                        </tr>
                    </thead>
                    <tbody id="externalLogTable" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://osfwbhcqibhtobaoojrv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZndiaGNxaWJodG9iYW9vanJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxMDU3MzksImV4cCI6MjA4NTY4MTczOX0.2NNaOhHfXMsYVWrBkJ1gudU4l0in35WU4bT4UgzkvlA';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function initPage() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) window.location.href = 'index.html';
            document.getElementById('userDisplay').innerText = user.email;
            loadExternalTable();
        }
        initPage();

        function showDetails() {
            document.getElementById('detailsArea').classList.remove('hidden');
        }

        const extForm = document.getElementById('externalSurveyForm');
        document.getElementById('toggleExtForm').onclick = () => {
            const isOpen = extForm.classList.contains('open');
            extForm.classList.toggle('open');
            document.getElementById('extToggleText').innerText = isOpen ? "Add Entry" : "Close Form";
        };

        async function loadExternalTable() {
            const { data } = await supabaseClient.from('external_surveys').select('*').order('created_at', { ascending: false }).limit(5);
            const tbody = document.getElementById('externalLogTable');
            tbody.innerHTML = data && data.length > 0 ? data.map(item => `
                <tr class="text-sm">
                    <td class="px-8 py-6">
                        <div class="font-bold text-slate-700">${item.age}y/o • ${item.gender}</div>
                        <div class="text-[9px] text-slate-400 uppercase font-black tracking-widest">${item.location} • ${item.occupation}</div>
                    </td>
                    <td class="px-8 py-6 text-center font-black text-[10px] ${item.has_availed_recently ? 'text-rose-500' : 'text-slate-400'}">
                        ${item.has_availed_recently ? 'YES' : 'NO'}
                    </td>
                    <td class="px-8 py-6 text-slate-400 italic text-xs leading-relaxed max-w-xs">${item.service_details || '--'}</td>
                </tr>
            `).join('') : '<tr><td colspan="3" class="p-8 text-center text-slate-300 text-xs uppercase font-black">No records found</td></tr>';
        }

        extForm.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('extSubmitBtn');
            btn.innerText = 'SAVING...';
            btn.disabled = true;

            const fd = new FormData(extForm);
            const payload = {
                age: parseInt(fd.get('age')),
                gender: fd.get('gender'),
                location: fd.get('location'),
                occupation: fd.get('occupation'),
                has_availed_recently: fd.get('has_availed_recently') === 'true',
                service_details: fd.get('service_details')
            };

            const { error } = await supabaseClient.from('external_surveys').insert([payload]);

            if (error) {
                alert("Error: " + error.message);
            } else {
                extForm.reset();
                extForm.classList.remove('open');
                document.getElementById('detailsArea').classList.add('hidden');
                document.getElementById('extToggleText').innerText = "Add Entry";
                loadExternalTable();
            }
            btn.innerText = 'Save External Data';
            btn.disabled = false;
        };
    </script>
</body>
</html>
