<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHMC | External Market Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    boxShadow: { '3xl': '0 20px 50px rgba(0, 0, 0, 0.05)' }
                }
            }
        }
    </script>
    <style>
        .input-focus:focus {
            background-color: white !important;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 p-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-8">
                <h1 class="font-black text-indigo-600 tracking-tighter text-xl uppercase italic">PHMC</h1>
                <div class="flex gap-6">
                    <a href="survey.html" class="text-xs font-black text-slate-400 hover:text-indigo-600 uppercase tracking-widest transition">Internal</a>
                    <a href="external_survey.html" class="text-xs font-black text-indigo-600 border-b-2 border-indigo-600 uppercase tracking-widest">External Market</a>
                </div>
            </div>
            <button onclick="supabaseClient.auth.signOut().then(() => window.location.href='index.html')" class="text-[10px] font-black text-slate-400 uppercase hover:text-red-500 transition">Logout</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 md:p-12">
        <header class="mb-10">
            <p class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.4em] mb-2">Outside Research</p>
            <h2 class="text-4xl font-black text-slate-900 tracking-tight">Market Analysis Survey</h2>
            <p class="text-slate-500 mt-2 font-medium">Gathering insights on external healthcare utilization.</p>
        </header>

        <form id="externalForm" class="bg-white rounded-[2.5rem] shadow-3xl border border-slate-100 overflow-hidden">
            <div class="p-8 md:p-12 space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Age</label>
                        <input type="number" name="age" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none transition-all font-semibold input-focus">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Gender</label>
                        <select name="gender" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none transition-all font-semibold appearance-none input-focus">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Current Location</label>
                        <input type="text" name="location" placeholder="City/Barangay" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none transition-all font-semibold input-focus">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Occupation</label>
                        <input type="text" name="occupation" placeholder="Job/Student" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none transition-all font-semibold input-focus">
                    </div>
                </div>

                <hr class="border-slate-100">

                <div class="space-y-4">
                    <label class="text-sm font-bold text-slate-700 block text-center mb-4">
                        Have you availed of any diagnostic clinic or hospital services for the past 6 months?
                    </label>
                    <div class="flex gap-4">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="has_availed_recently" value="true" class="peer hidden" onchange="toggleDetails(true)">
                            <div class="p-5 border-2 border-slate-100 rounded-3xl text-center font-black uppercase tracking-widest text-slate-400 transition-all peer-checked:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:text-indigo-600">Yes</div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="has_availed_recently" value="false" class="peer hidden" onchange="toggleDetails(false)" checked>
                            <div class="p-5 border-2 border-slate-100 rounded-3xl text-center font-black uppercase tracking-widest text-slate-400 transition-all peer-checked:bg-slate-900 peer-checked:border-slate-900 peer-checked:text-white">No</div>
                        </label>
                    </div>
                </div>

                <div id="detailsContainer" class="hidden animate-fade-in space-y-2">
                    <label class="text-[10px] font-black text-indigo-500 uppercase ml-2">Visit Specifics</label>
                    <textarea name="service_details" rows="4" 
                        placeholder="Which Hospital/clinic, what services, when is your last visit?" 
                        class="w-full p-6 bg-slate-50 rounded-[2rem] border-2 border-transparent focus:border-indigo-500 outline-none transition-all italic text-slate-600 placeholder:text-slate-300 input-focus"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-black uppercase tracking-[0.3em] py-6 rounded-3xl shadow-xl hover:bg-indigo-700 hover:-translate-y-1 transition-all text-sm mt-4">
                    Submit Market Data
                </button>
            </div>
        </form>
    </main>

    <script>
        const SB_URL = 'https://osfwbhcqibhtobaoojrv.supabase.co';
        const SB_KEY = 'YOUR_KEY_HERE'; // Use your actual key
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        function toggleDetails(show) {
            const container = document.getElementById('detailsContainer');
            const textarea = container.querySelector('textarea');
            if (show) {
                container.classList.remove('hidden');
                textarea.required = true;
            } else {
                container.classList.add('hidden');
                textarea.required = false;
                textarea.value = '';
            }
        }

        document.getElementById('externalForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'UPLOADING...';
            btn.disabled = true;

            const fd = new FormData(e.target);
            const payload = {
                age: parseInt(fd.get('age')),
                gender: fd.get('gender'),
                location: fd.get('location'),
                occupation: fd.get('occupation'),
                has_availed_recently: fd.get('has_availed_recently') === 'true',
                service_details: fd.get('service_details')
            };

            const { error } = await supabaseClient
                .from('external_surveys')
                .insert([payload]);

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Market record saved successfully!");
                e.target.reset();
                toggleDetails(false);
            }
            
            btn.innerText = 'Submit Market Data';
            btn.disabled = false;
        };
    </script>
</body>
</html>
