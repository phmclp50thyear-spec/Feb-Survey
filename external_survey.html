<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHMC | External Market Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    boxShadow: { '3xl': '0 20px 50px rgba(0, 0, 0, 0.05)' }
                }
            }
        }
    </script>
    <style>
        .collapsible-content { max-height: 0; overflow: hidden; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        .collapsible-content.open { max-height: 2000px; opacity: 1; margin-bottom: 2rem; }
        
        input:focus, select:focus, textarea:focus {
            background-color: white !important;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 p-3 md:p-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4 md:gap-8">
                <h1 class="font-black text-indigo-600 tracking-tighter text-lg md:text-xl uppercase italic">PHMC</h1>
                <div class="flex gap-4 md:gap-6">
                    <a href="survey.html" class="text-sm font-bold text-slate-400 hover:text-indigo-600 flex items-center gap-1.5 transition-colors uppercase tracking-widest">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                        <span class="hidden md:inline">Internal Survey</span>
                    </a>
                    <a href="external_survey.html" class="text-sm font-bold text-indigo-600 flex items-center gap-1.5 transition-colors uppercase tracking-widest border-b-2 border-indigo-600">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                        <span class="hidden md:inline">External Survey</span>
                    </a>
                    <a href="reports.html" class="text-sm font-bold text-slate-400 hover:text-indigo-600 flex items-center gap-1.5 transition-colors uppercase tracking-widest">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                        <span class="hidden md:inline">Reports</span>
                    </a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="userDisplay" class="hidden lg:inline text-[10px] font-black text-slate-400 uppercase tracking-widest">...</span>
                <button onclick="supabaseClient.auth.signOut().then(() => window.location.href='index.html')" class="bg-slate-100 text-[10px] font-black px-4 py-2 rounded-full uppercase tracking-widest hover:bg-red-50 hover:text-red-600 transition">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-12">
        <div class="flex justify-between items-end mb-10">
            <div>
                <p class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.4em] mb-2">Market Research</p>
                <h2 class="text-4xl font-black text-slate-900 tracking-tight">External Data</h2>
            </div>
            <button id="toggleForm" class="group bg-slate-900 text-white p-4 rounded-2xl shadow-2xl hover:bg-indigo-600 transition-all active:scale-95 flex items-center gap-3">
                <span id="btnIcon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></span>
                <span class="text-xs font-black uppercase tracking-widest px-2" id="toggleText">Add Survey</span>
            </button>
        </div>

        <form id="externalForm" class="collapsible-content bg-white rounded-[2.5rem] shadow-3xl border border-slate-100 overflow-hidden">
            <div class="p-8 md:p-12 space-y-8">
                <div class="flex items-center gap-4 mb-4">
                    <div class="h-1 w-12 bg-indigo-600 rounded-full"></div>
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">New External Entry</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Age</label>
                        <input type="number" name="age" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none transition-all font-semibold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Gender</label>
                        <select name="gender" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none transition-all font-semibold appearance-none">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Location</label>
                        <input type="text" name="location" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none transition-all font-semibold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Occupation</label>
                        <input type="text" name="occupation" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none transition-all font-semibold">
                    </div>
                </div>

                <div class="bg-indigo-50/50 p-6 rounded-[2rem] border border-indigo-100">
                    <p class="text-[10px] font-black text-indigo-600 uppercase tracking-widest mb-4 text-center">Diagnostic History (Past 6 Months)</p>
                    <div class="flex gap-4">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="has_availed_recently" value="true" class="peer hidden" onchange="toggleDetails(true)">
                            <div class="p-4 rounded-2xl text-center border-2 border-slate-200 bg-white text-slate-400 font-bold text-xs uppercase transition-all peer-checked:border-indigo-600 peer-checked:text-indigo-600">Yes</div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="has_availed_recently" value="false" class="peer hidden" onchange="toggleDetails(false)" checked>
                            <div class="p-4 rounded-2xl text-center border-2 border-slate-200 bg-white text-slate-400 font-bold text-xs uppercase transition-all peer-checked:border-indigo-600 peer-checked:text-indigo-600">No</div>
                        </label>
                    </div>
                </div>

                <div id="detailsContainer" class="hidden space-y-2 animate-fade-in">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Visit Details</label>
                    <textarea name="service_details" rows="3" placeholder="Which Hospital/clinic, what services, when is your last visit?" class="w-full p-6 bg-slate-50 rounded-[2rem] border-2 border-transparent focus:border-indigo-500 outline-none transition-all italic text-slate-600 placeholder:text-slate-300"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-black uppercase tracking-[0.3em] py-6 rounded-3xl shadow-xl hover:bg-indigo-700 hover:-translate-y-1 transition-all text-sm">
                    Save External Record
                </button>
            </div>
        </form>

        <div class="bg-white rounded-[2.5rem] shadow-3xl border border-slate-100 overflow-hidden">
            <div class="p-8 border-b border-slate-50 flex justify-between items-center">
                <h3 class="text-xs font-black text-slate-900 uppercase tracking-widest">External Records Log</h3>
                <span class="bg-indigo-50 text-indigo-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">Market Feed</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] uppercase font-black text-slate-400 bg-slate-50/50">
                            <th class="px-8 py-4">Respondent</th>
                            <th class="px-8 py-4 text-center">Availed?</th>
                            <th class="px-8 py-4">Details</th>
                        </tr>
                    </thead>
                    <tbody id="externalLogBody" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://osfwbhcqibhtobaoojrv.supabase.co';
        const SB_KEY = 'YOUR_KEY_HERE'; // Ensure this matches your survey.html key
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) window.location.href = 'index.html';
            document.getElementById('userDisplay').innerText = user.email;
            loadExternalLogs();
        }
        init();

        const form = document.getElementById('externalForm');
        document.getElementById('toggleForm').onclick = () => {
            const isOpen = form.classList.contains('open');
            form.classList.toggle('open');
            document.getElementById('toggleText').innerText = isOpen ? "Add Survey" : "Close Form";
            document.getElementById('btnIcon').innerHTML = isOpen ? 
                `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>` : 
                `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
        };

        function toggleDetails(show) {
            const container = document.getElementById('detailsContainer');
            if (show) container.classList.remove('hidden');
            else container.classList.add('hidden');
        }

        async function loadExternalLogs() {
            const { data } = await supabaseClient.from('external_surveys').select('*').order('created_at', { ascending: false }).limit(5);
            const tbody = document.getElementById('externalLogBody');
            tbody.innerHTML = data.map(item => `
                <tr class="group hover:bg-slate-50 transition-colors">
                    <td class="px-8 py-6">
                        <div class="font-bold text-slate-800">${item.age}y/o • ${item.gender}</div>
                        <div class="text-[9px] text-slate-400 uppercase font-black tracking-widest">${item.location}</div>
                    </td>
                    <td class="px-8 py-6 text-center">
                        <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${item.has_availed_recently ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-500'}">
                            ${item.has_availed_recently ? 'YES' : 'NO'}
                        </span>
                    </td>
                    <td class="px-8 py-6 text-xs text-slate-500 italic max-w-xs truncate">${item.service_details || 'N/A'}</td>
                </tr>
            `).join('');
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'SYNCING...';
            btn.disabled = true;

            const fd = new FormData(form);
            const payload = {
                age: parseInt(fd.get('age')),
                gender: fd.get('gender'),
                location: fd.get('location'),
                occupation: fd.get('occupation'),
                has_availed_recently: fd.get('has_availed_recently') === 'true',
                service_details: fd.get('service_details')
            };

            const { error } = await supabaseClient.from('external_surveys').insert([payload]);

            if (error) alert(error.message);
            else {
                form.reset();
                form.classList.remove('open');
                loadExternalLogs();
            }
            btn.innerText = 'Save External Record';
            btn.disabled = false;
        };
    </script>
</body>
</html>
