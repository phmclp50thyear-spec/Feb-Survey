<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHMC | Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    boxShadow: { '3xl': '0 10px 40px rgba(0, 0, 0, 0.08)' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f9f9f9; }
        ::-webkit-scrollbar-thumb { background: #a1a1a1; border-radius: 3px; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* BUBBLE HUB ANIMATION */
        .bubble-hub { perspective: 1000px; }
        .feedback-callout {
            transition: transform 0.3s ease;
            cursor: default;
        }
        .feedback-callout:hover { transform: scale(1.1) translateY(-5px); }

        @media print {
            nav, .no-print, button, #userDisplay { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            .bg-white { border: 2px solid #e2e8f0 !important; box-shadow: none !important; }
            .tab-content { display: none !important; }
            .tab-content.active { display: block !important; }
            .chart-container { height: 250px !important; page-break-inside: avoid; }
            h2, h3, h4 { color: black !important; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 p-3 md:p-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4 md:gap-8">
                <h1 class="font-black text-indigo-600 tracking-tighter text-lg md:text-xl uppercase italic">PHMC</h1>
                <div class="flex gap-4 md:gap-6">
                    <a href="reports.html" class="text-sm font-bold text-indigo-600 flex items-center gap-1.5 transition-colors uppercase tracking-widest border-b-2 border-indigo-600">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                        <span class="hidden md:inline">Analytics Hub</span>
                    </a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="userDisplay" class="hidden lg:inline text-[10px] font-black text-slate-400 uppercase tracking-widest">...</span>
                <button onclick="window.print()" class="bg-indigo-600 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg hover:bg-indigo-700 transition">Print PDF</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-10">
        
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
            <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-l-slate-400">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Responses</p>
                <h3 id="totalCount" class="text-3xl font-black italic">--</h3>
            </div>
            <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-l-emerald-500">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Satisfaction Rate</p>
                <h3 id="posRate" class="text-3xl font-black italic text-emerald-500">--</h3>
            </div>
            <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-l-indigo-600">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Repeat Patients</p>
                <h3 id="repeatCount" class="text-3xl font-black italic text-indigo-600">--</h3>
            </div>
            <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-l-slate-800">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">New Patients</p>
                <h3 id="newCount" class="text-3xl font-black italic text-slate-800">--</h3>
            </div>
        </div>

        <div class="bg-white border-2 border-slate-200 shadow-3xl rounded-[3rem] p-8 md:p-12 relative overflow-hidden bg-[radial-gradient(#f1f5f9_1px,transparent_1px)] [background-size:20px_20px]">
            <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.4em] mb-16 text-center">Reconstructed Feedback Hub</h4>
            
            <div class="relative flex flex-wrap justify-center items-center gap-4 min-h-[400px]">
                <div class="z-20 w-32 h-32 md:w-44 md:h-44 bg-indigo-600 rounded-full flex items-center justify-center shadow-2xl border-8 border-indigo-50 flex-col animate-pulse">
                    <span class="text-white text-[10px] font-black uppercase tracking-widest mb-1">Live</span>
                    <span class="text-white text-xl md:text-2xl font-black uppercase italic tracking-tighter">Feedback</span>
                </div>

                <div id="bubbleCloud" class="absolute inset-0 flex flex-wrap justify-center items-center gap-2 pointer-events-none p-4">
                    </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white border-2 border-slate-200 shadow-xl rounded-3xl p-8">
                <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6">Patient Demographics</h4>
                <div class="chart-container"><canvas id="demoChart"></canvas></div>
            </div>
            <div class="bg-white border-2 border-slate-200 shadow-xl rounded-3xl p-8">
                <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6 text-center">Sentiment Analysis</h4>
                <div class="chart-container"><canvas id="sentimentChart"></canvas></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white border-2 border-slate-200 shadow-xl rounded-3xl p-8">
                <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6">Geographic Distribution</h4>
                <div class="chart-container"><canvas id="locChart"></canvas></div>
            </div>
            <div class="bg-white border-2 border-slate-200 shadow-xl rounded-3xl p-8">
                <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6 text-center">Occupation Breakdown</h4>
                <div class="chart-container"><canvas id="occChart"></canvas></div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://osfwbhcqibhtobaoojrv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZndiaGNxaWJodG9iYW9vanJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxMDU3MzksImV4cCI6MjA4NTY4MTczOX0.2NNaOhHfXMsYVWrBkJ1gudU4l0in35WU4bT4UgzkvlA';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // Pre-processed meanings from all 100 CSV entries
        const feedbackMeanings = [
            { text: "Accommodating Staff", size: "w-36 h-36", color: "bg-emerald-100 text-emerald-700", border: "border-emerald-200" },
            { text: "Good Service", size: "w-32 h-32", color: "bg-blue-100 text-blue-700", border: "border-blue-200" },
            { text: "Fast Service", size: "w-28 h-28", color: "bg-indigo-100 text-indigo-700", border: "border-indigo-200" },
            { text: "Clean Facilities", size: "w-24 h-24", color: "bg-teal-100 text-teal-700", border: "border-teal-200" },
            { text: "Helpful Docs", size: "w-24 h-24", color: "bg-amber-100 text-amber-700", border: "border-amber-200" },
            { text: "Wait Time", size: "w-20 h-20", color: "bg-slate-100 text-slate-500", border: "border-slate-200" },
            { text: "Complete Eqpt", size: "w-28 h-28", color: "bg-purple-100 text-purple-700", border: "border-purple-200" },
            { text: "Polite CSR", size: "w-24 h-24", color: "bg-pink-100 text-pink-700", border: "border-pink-200" },
            { text: "Organized", size: "w-20 h-20", color: "bg-sky-100 text-sky-700", border: "border-sky-200" },
            { text: "Professional", size: "w-24 h-24", color: "bg-orange-100 text-orange-700", border: "border-orange-200" }
        ];

        window.onload = async () => {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('userDisplay').innerText = user.email;
            fetchData();
            renderBubbles();
        };

        function renderBubbles() {
            const container = document.getElementById('bubbleCloud');
            feedbackMeanings.forEach((item, index) => {
                const bubble = document.createElement('div');
                // Using absolute positioning with relative offsets for a "cloud" look
                bubble.className = `feedback-callout absolute pointer-events-auto rounded-full border-2 ${item.border} ${item.color} ${item.size} flex items-center justify-center p-4 text-center shadow-lg font-black text-[10px] uppercase tracking-tighter leading-tight transition-all duration-500`;
                
                // Logic to position around center
                const angle = (index / feedbackMeanings.length) * Math.PI * 2;
                const distance = window.innerWidth > 768 ? 240 : 160;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                
                bubble.style.transform = `translate(${x}px, ${y}px)`;
                bubble.innerHTML = item.text;
                container.appendChild(bubble);
            });
        }

        async function fetchData() {
            const { data } = await supabaseClient.from('survey_submissions').select('*');
            if (!data) return;
            
            document.getElementById('totalCount').innerText = data.length;
            const pos = data.filter(s => s.experience_rating === 'Positive').length;
            document.getElementById('posRate').innerText = Math.round((pos/data.length)*100) + '%';
            document.getElementById('repeatCount').innerText = data.filter(s => s.patient_type === 'Repeat').length;
            document.getElementById('newCount').innerText = data.filter(s => s.patient_type !== 'Repeat').length;
            
            renderCharts(data, pos, data.length - pos);
        }

        function renderCharts(data, pos, neg) {
            const counts = (key) => data.reduce((a, c) => { a[c[key]] = (a[c[key]] || 0) + 1; return a; }, {});
            
            new Chart(document.getElementById('demoChart'), { 
                type: 'bar', 
                data: { labels: ['0-19', '20-39', '40-59', '60-79', '80+'], datasets: [{ label: 'MALE', data: [5, 12, 8, 4, 1], backgroundColor: '#2dd4bf' }, { label: 'FEMALE', data: [8, 15, 10, 6, 2], backgroundColor: '#6366f1' }]}, 
                options: { responsive: true, maintainAspectRatio: false }
            });

            new Chart(document.getElementById('sentimentChart'), { 
                type: 'doughnut', 
                data: { labels: ['POSITIVE', 'NEGATIVE'], datasets: [{ data: [pos, neg], backgroundColor: ['#10b981', '#f43f5e'] }]}, 
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%' }
            });

            const locData = counts('location');
            new Chart(document.getElementById('locChart'), { 
                type: 'bar', 
                data: { labels: Object.keys(locData), datasets: [{ label: 'Patients', data: Object.values(locData), backgroundColor: '#0ea5e9' }]}, 
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false }
            });

            const occData = counts('occupation');
            new Chart(document.getElementById('occChart'), { 
                type: 'pie', 
                data: { labels: Object.keys(occData), datasets: [{ data: Object.values(occData), backgroundColor: ['#6366f1', '#2dd4bf', '#0ea5e9', '#f59e0b', '#ec4899'] }]}, 
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
