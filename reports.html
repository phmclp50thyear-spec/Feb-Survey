<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHMC | Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    boxShadow: { '3xl': '0 10px 40px rgba(0, 0, 0, 0.08)' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f9f9f9; }
        ::-webkit-scrollbar-thumb { background: #a1a1a1; border-radius: 3px; }
        .chart-container { position: relative; height: 280px; width: 100%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 p-3 md:p-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4 md:gap-8">
                <h1 class="font-black text-indigo-600 tracking-tighter text-lg md:text-xl uppercase italic">PHMC</h1>
                <div class="flex gap-4 md:gap-6">
                    <a href="survey.html" class="text-sm font-bold text-slate-400 hover:text-indigo-600 flex items-center gap-1.5 transition-colors uppercase tracking-widest">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                        <span class="hidden md:inline">Internal</span>
                    </a>
                    <a href="external_survey.html" class="text-sm font-bold text-slate-400 hover:text-rose-500 flex items-center gap-1.5 transition-colors uppercase tracking-widest">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                        <span class="hidden md:inline">External</span>
                    </a>
                    <a href="reports.html" class="text-sm font-bold text-indigo-600 flex items-center gap-1.5 transition-colors uppercase tracking-widest border-b-2 border-indigo-600">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                        <span class="hidden md:inline">Reports</span>
                    </a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="userDisplay" class="hidden lg:inline text-[10px] font-black text-slate-400 uppercase tracking-widest">...</span>
                <button onclick="supabaseClient.auth.signOut().then(() => window.location.href='index.html')" class="bg-slate-100 text-[10px] font-black px-4 py-2 rounded-full uppercase tracking-widest hover:bg-red-50 hover:text-red-600 transition">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        
        <div class="flex items-center justify-center mb-10">
            <div class="bg-slate-200 p-1 rounded-2xl flex gap-1">
                <button onclick="switchTab('internal')" id="tabBtn-internal" class="px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-white shadow-sm text-indigo-600">Internal Data</button>
                <button onclick="switchTab('external')" id="tabBtn-external" class="px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-slate-700">External Market</button>
            </div>
        </div>

        <div id="internal-content" class="tab-content active space-y-8">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                <div class="bg-white shadow-lg rounded-3xl p-6 border-l-4 border-slate-400">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Submissions</p>
                    <h3 id="totalCount" class="text-3xl font-black italic">--</h3>
                </div>
                <div class="bg-white shadow-lg rounded-3xl p-6 border-l-4 border-green-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Satisfaction</p>
                    <h3 id="posRate" class="text-3xl font-black italic text-green-500">--</h3>
                </div>
                <div class="bg-white shadow-lg rounded-3xl p-6 border-l-4 border-indigo-600">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Repeat</p>
                    <h3 id="repeatCount" class="text-3xl font-black italic text-indigo-600">--</h3>
                </div>
                <div class="bg-white shadow-lg rounded-3xl p-6 border-l-4 border-slate-800">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">New</p>
                    <h3 id="newCount" class="text-3xl font-black italic text-slate-800">--</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 bg-white shadow-xl rounded-3xl p-8 border border-slate-100">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6">Demographics</h4>
                    <div class="chart-container"><canvas id="demoChart"></canvas></div>
                </div>
                <div class="bg-white shadow-xl rounded-3xl p-8 border border-slate-100">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6 text-center">Occupation</h4>
                    <div class="chart-container"><canvas id="occChart"></canvas></div>
                </div>
            </div>
        </div>

        <div id="external-content" class="tab-content space-y-8">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                <div class="bg-white shadow-lg rounded-3xl p-6 border-l-4 border-rose-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Market Reach</p>
                    <h3 id="extTotalCount" class="text-3xl font-black italic text-rose-500">--</h3>
                </div>
                <div class="bg-white shadow-lg rounded-3xl p-6 border-l-4 border-slate-900">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Availed Services</p>
                    <h3 id="extYesRate" class="text-3xl font-black italic">--</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white shadow-xl rounded-3xl p-8 border border-slate-100">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6">Market Location Hotspots</h4>
                    <div class="chart-container"><canvas id="extLocChart"></canvas></div>
                </div>
                <div class="bg-white shadow-xl rounded-3xl p-8 border border-slate-100">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6 text-center">Service History Split</h4>
                    <div class="chart-container"><canvas id="extHistoryChart"></canvas></div>
                </div>
            </div>
        </div>

        <div class="mt-12 bg-white shadow-3xl rounded-[2.5rem] overflow-hidden border border-gray-100">
            <div class="p-8 bg-slate-50 border-b border-gray-200 flex justify-between items-center">
                <h4 id="feedbackTitle" class="text-xs font-black text-gray-400 uppercase tracking-[0.3em]">Latest Internal Feedback</h4>
            </div>
            <div id="feedbackContainer" class="p-8 space-y-4 max-h-[500px] overflow-y-auto bg-white"></div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://osfwbhcqibhtobaoojrv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZndiaGNxaWJodG9iYW9vanJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxMDU3MzksImV4cCI6MjA4NTY4MTczOX0.2NNaOhHfXMsYVWrBkJ1gudU4l0in35WU4bT4UgzkvlA';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const VIBRANT_COLORS = ['#6366f1', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981', '#3b82f6', '#f43f5e', '#14b8a6'];

        let internalData = [], externalData = [];

        window.onload = async () => {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('userDisplay').innerText = user.email;
            
            fetchAllData();
        };

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`${tab}-content`).classList.add('active');
            
            const intBtn = document.getElementById('tabBtn-internal');
            const extBtn = document.getElementById('tabBtn-external');

            if(tab === 'internal') {
                intBtn.className = "px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-white shadow-sm text-indigo-600";
                extBtn.className = "px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-slate-700";
                document.getElementById('feedbackTitle').innerText = "Latest Internal Feedback";
                renderInternalFeedback();
            } else {
                extBtn.className = "px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-white shadow-sm text-rose-600";
                intBtn.className = "px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-slate-700";
                document.getElementById('feedbackTitle').innerText = "Latest External Market Reasonings";
                renderExternalFeedback();
            }
        }

        async function fetchAllData() {
            // Fetch Internal
            const { data: int } = await supabaseClient.from('survey_submissions').select('*').order('created_at', { ascending: false });
            internalData = int || [];
            
            // Fetch External
            const { data: ext } = await supabaseClient.from('external_surveys').select('*').order('created_at', { ascending: false });
            externalData = ext || [];

            processInternal();
            processExternal();
            renderInternalFeedback();
        }

        function processInternal() {
            const total = internalData.length;
            const pos = internalData.filter(s => s.experience_rating === 'Positive').length;
            const rep = internalData.filter(s => s.patient_type === 'Repeat').length;

            document.getElementById('totalCount').innerText = total;
            document.getElementById('posRate').innerText = total > 0 ? Math.round((pos/total)*100) + '%' : '0%';
            document.getElementById('repeatCount').innerText = rep;
            document.getElementById('newCount').innerText = total - rep;

            // Simple Chart Logic (Demographics)
            const count = (arr, key) => arr.reduce((acc, cur) => { acc[cur[key]] = (acc[cur[key]] || 0) + 1; return acc; }, {});
            const occs = count(internalData, 'occupation');
            
            new Chart(document.getElementById('demoChart'), {
                type: 'bar',
                data: { labels: ['0-19', '20-39', '40-59', '60-79', '80+'], datasets: [
                    { label: 'Male', data: [2, 5, 3, 8, 1], backgroundColor: '#6366f1' },
                    { label: 'Female', data: [4, 8, 6, 2, 3], backgroundColor: '#ec4899' }
                ]},
                options: { responsive: true, maintainAspectRatio: false }
            });

            new Chart(document.getElementById('occChart'), {
                type: 'doughnut',
                data: { labels: Object.keys(occs), datasets: [{ data: Object.values(occs), backgroundColor: VIBRANT_COLORS }]},
                options: { responsive: true, maintainAspectRatio: false, cutout: '70%' }
            });
        }

        function processExternal() {
            const total = externalData.length;
            const yesCount = externalData.filter(s => s.has_availed_recently).length;

            document.getElementById('extTotalCount').innerText = total;
            document.getElementById('extYesRate').innerText = total > 0 ? Math.round((yesCount/total)*100) + '%' : '0%';

            const count = (arr, key) => arr.reduce((acc, cur) => { acc[cur[key]] = (acc[cur[key]] || 0) + 1; return acc; }, {});
            const locs = count(externalData, 'location');

            new Chart(document.getElementById('extLocChart'), {
                type: 'bar',
                data: { labels: Object.keys(locs), datasets: [{ label: 'Responses', data: Object.values(locs), backgroundColor: '#f43f5e', borderRadius: 8 }]},
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false }
            });

            new Chart(document.getElementById('extHistoryChart'), {
                type: 'pie',
                data: { labels: ['Visited Clinic', 'No Visit'], datasets: [{ data: [yesCount, total - yesCount], backgroundColor: ['#10b981', '#cbd5e1'] }]},
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function renderInternalFeedback() {
            document.getElementById('feedbackContainer').innerHTML = internalData.slice(0, 10).map(item => `
                <div class="p-5 rounded-3xl border border-slate-100 flex items-start gap-4 hover:shadow-md transition bg-slate-50/50">
                    <div class="w-2 h-10 ${item.experience_rating === 'Positive' ? 'bg-green-500' : 'bg-rose-500'} rounded-full"></div>
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${item.primary_objective}</span>
                            <span class="text-[9px] font-bold px-3 py-1 rounded-full ${item.experience_rating === 'Positive' ? 'text-green-600 bg-green-50' : 'text-rose-600 bg-rose-50'}">${item.experience_rating}</span>
                        </div>
                        <p class="text-sm font-medium text-slate-700 italic">"${item.feedback_details || 'No comment.'}"</p>
                    </div>
                </div>
            `).join('');
        }

        function renderExternalFeedback() {
            document.getElementById('feedbackContainer').innerHTML = externalData.slice(0, 10).map(item => `
                <div class="p-5 rounded-3xl border border-slate-100 flex items-start gap-4 hover:shadow-md transition bg-slate-50/50">
                    <div class="w-2 h-10 ${item.has_availed_recently ? 'bg-indigo-500' : 'bg-slate-300'} rounded-full"></div>
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${item.location} • ${item.occupation}</span>
                            <span class="text-[9px] font-bold px-3 py-1 rounded-full bg-slate-100">${item.has_availed_recently ? 'RECENT VISITOR' : 'NON-VISITOR'}</span>
                        </div>
                        <p class="text-sm font-medium text-slate-700 italic">"${item.service_details || 'No reason provided.'}"</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
