<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHMC | Advanced Cross-Quarter Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- Core Highcharts + Modules -->
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/highcharts-more.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .highcharts-container { border-radius: 1.5rem !important; overflow: visible !important; }
    </style>
</head>
<body class="bg-[#0f172a] font-sans text-slate-100 min-h-screen">

    <nav class="bg-[#1e293b]/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-800 p-4 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-8">
                <h1 class="font-black text-indigo-400 tracking-tighter text-xl uppercase italic">PHMC</h1>
                <div class="flex gap-6">
                    <a href="survey.html" class="text-sm font-bold text-slate-400 hover:text-indigo-400 transition uppercase tracking-widest">Internal</a>
                    <a href="external_survey.html" class="text-sm font-bold text-slate-400 hover:text-rose-400 transition uppercase tracking-widest">External</a>
                    <a href="reports.html" class="text-sm font-bold text-indigo-400 border-b-2 border-indigo-400 uppercase tracking-widest">Reports</a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right mr-2">
                    <span id="userDisplay" class="text-[10px] font-black text-slate-400 block uppercase tracking-widest">...</span>
                    <span class="text-[8px] font-bold text-emerald-400 block bg-emerald-500/10 px-2 py-0.5 rounded-md mt-0.5 uppercase tracking-wide border border-emerald-500/20">Comparative Quarter Mode</span>
                </div>
                <button id="logoutBtn" onclick="supabaseClient.auth.signOut().then(() => window.location.href='index.html')" class="hidden bg-slate-800 text-[10px] font-black px-4 py-2 rounded-full hover:bg-rose-950 hover:text-rose-400 border border-slate-700 transition uppercase tracking-widest">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-8 space-y-8">
        <div class="flex flex-col md:flex-row justify-between items-stretch gap-6">
            <div class="bg-[#1e293b] p-2 rounded-2xl flex items-center gap-1 border border-slate-800 self-start">
                <button onclick="switchDashboard('internal')" id="btn-internal" class="px-10 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-indigo-600 shadow-md text-white">Internal Data</button>
                <button onclick="switchDashboard('external')" id="btn-external" class="px-10 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-200">External Market</button>
            </div>
            <div class="bg-[#1e293b] border border-slate-800 rounded-2xl p-4 flex-1 flex flex-col sm:flex-row justify-between items-center gap-4 px-8 shadow-2xl">
                <div class="flex flex-col">
                    <span class="text-[9px] font-black tracking-widest text-slate-400 uppercase">Total Submissions Matrix</span>
                    <div class="flex items-baseline gap-2">
                        <span id="txt-total-pool" class="text-3xl font-black text-white italic">--</span>
                        <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Responses Pool</span>
                    </div>
                </div>
                <div class="flex gap-4 w-full sm:w-auto">
                    <div class="bg-slate-900/60 border border-slate-800 rounded-xl p-2 px-4 text-center min-w-[100px] flex-1 sm:flex-initial">
                        <span class="text-[9px] font-black text-indigo-400 block tracking-widest uppercase">Q1 March</span>
                        <span id="txt-q1-count" class="text-xl font-black text-white">--</span>
                    </div>
                    <div class="bg-slate-900/60 border border-slate-800 rounded-xl p-2 px-4 text-center min-w-[100px] flex-1 sm:flex-initial">
                        <span id="lbl-q2-title" class="text-[9px] font-black text-teal-400 block tracking-widest uppercase">Q2 June/July</span>
                        <span id="txt-q2-count" class="text-xl font-black text-white">--</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-[#1e293b] border border-slate-800 rounded-3xl p-4 shadow-xl relative min-h-[340px]">
                <div id="satChartOverall" class="w-full h-full"></div>
            </div>
            <div class="bg-[#1e293b] border border-slate-800 rounded-3xl p-4 shadow-xl relative min-h-[340px]">
                <div id="satChartQ1" class="w-full h-full"></div>
            </div>
            <div class="bg-[#1e293b] border border-slate-800 rounded-3xl p-4 shadow-xl relative min-h-[340px]">
                <div id="satChartQ2" class="w-full h-full"></div>
            </div>
        </div>

        <div id="section-internal" class="tab-content active space-y-6">
            <div class="bg-[#1e293b] shadow-xl rounded-3xl p-6 border border-slate-800 w-full overflow-visible">
                 <div id="intDemoChartQ1" class="w-full h-[240px]"></div>
            </div>
            <div class="bg-[#1e293b] shadow-xl rounded-3xl p-6 border border-slate-800 w-full overflow-visible">
                 <div id="intDemoChartQ2" class="w-full h-[240px]"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-[#1e293b] shadow-xl rounded-3xl p-6 border border-slate-800" id="intLocChart"></div>
                <div class="bg-[#1e293b] shadow-xl rounded-3xl p-6 border border-slate-800" id="intSentimentChart"></div>
            </div>
        </div>

        <div id="section-external" class="tab-content space-y-6">
            <div class="bg-[#1e293b] shadow-xl rounded-3xl p-6 border border-slate-800 w-full overflow-visible">
                 <div id="extDemoChartQ1" class="w-full h-[240px]"></div>
            </div>
            <div class="bg-[#1e293b] shadow-xl rounded-3xl p-6 border border-slate-800 w-full overflow-visible">
                 <div id="extDemoChartQ2" class="w-full h-[240px]"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-[#1e293b] shadow-xl rounded-3xl p-6 border border-slate-800" id="extLocChart"></div>
                <div class="bg-[#1e293b] shadow-xl rounded-3xl p-6 border border-slate-800" id="extBalanceChart"></div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://osfwbhcqibhtobaoojrv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZndiaGNxaWJodG9iYW9vanJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxMDU3MzksImV4cCI6MjA4NTY4MTczOX0.2NNaOhHfXMsYVWrBkJ1gudU4l0in35WU4bT4UgzkvlA';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const Q1_START = '2026-03-01T00:00:00.000Z', Q1_END = '2026-03-31T23:59:59.999Z';
        const Q2_START = '2026-06-01T00:00:00.000Z', Q2_END = '2026-07-31T23:59:59.999Z';

        let cachedInternal = { q1: [], q2: [] }, cachedExternal = { q1: [], q2: [] };

        const darkThemeBase = {
            chart: { backgroundColor: '#1e293b', style: { fontFamily: 'Inter, sans-serif' } },
            title: { style: { color: '#94a3b8', fontSize: '10px', fontWeight: '900', letterSpacing: '0.25em' }, align: 'left' },
            xAxis: { gridLineColor: '#334155', lineColor: '#334155', tickColor: '#334155', labels: { style: { color: '#94a3b8' } } },
            yAxis: { gridLineColor: '#334155', lineColor: '#334155', title: { text: null }, labels: { style: { color: '#94a3b8' } } },
            legend: { enabled: false }, exporting: { enabled: false }, credits: { enabled: false }
        };

        window.onload = async () => {
            const { data: { user } } = await supabaseClient.auth.getUser();
            document.getElementById('userDisplay').innerText = user ? user.email : "GUEST ANALYST VIEW";
            if (user) document.getElementById('logoutBtn').classList.remove('hidden');
            await fetchMetricsDataPipeline();
            switchDashboard('internal'); 
        };

        async function fetchMetricsDataPipeline() {
            const [intQ1, intQ2, extQ1, extQ2] = await Promise.all([
                supabaseClient.from('survey_submissions').select('*').gte('created_at', Q1_START).lte('created_at', Q1_END),
                supabaseClient.from('survey_submissions').select('*').gte('created_at', Q2_START).lte('created_at', Q2_END),
                supabaseClient.from('external_surveys').select('*').gte('created_at', Q1_START).lte('created_at', Q1_END),
                supabaseClient.from('external_surveys').select('*').gte('created_at', Q2_START).lte('created_at', Q2_END)
            ]);
            cachedInternal = { q1: intQ1.data || [], q2: intQ2.data || [] };
            cachedExternal = { q1: extQ1.data || [], q2: extQ2.data || [] };
        }

        function switchDashboard(type) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`section-${type}`).classList.add('active');
            if(type === 'internal') {
                renderActiveDataset(cachedInternal.q1, cachedInternal.q2, 'internal');
            } else {
                renderActiveDataset(cachedExternal.q1, cachedExternal.q2, 'external');
            }
        }

        function renderActiveDataset(q1, q2, mode) {
            document.getElementById('txt-total-pool').innerText = q1.length + q2.length;
            document.getElementById('txt-q1-count').innerText = q1.length;
            document.getElementById('txt-q2-count').innerText = q2.length;

            const isInt = mode === 'internal';
            
            // Pie charts
            const basePieConf = (title, data) => Highcharts.merge(darkThemeBase, {
                title: { text: title },
                series: [{ type: 'pie', data: data }]
            });

            Highcharts.chart('satChartOverall', basePieConf('TOTAL VOLUME', [{name: 'Q1', y: q1.length, color: '#4f46e5'}, {name: 'Q2', y: q2.length, color: '#06b6d4'}]));
            Highcharts.chart('satChartQ1', basePieConf('Q1 DISTRIBUTION', [{name: 'Data', y: q1.length, color: '#4f46e5'}]));
            Highcharts.chart('satChartQ2', basePieConf('Q2 DISTRIBUTION', [{name: 'Data', y: q2.length, color: '#06b6d4'}]));

            if (isInt) {
                renderSpiderwebGenderChart('intDemoChartQ1', q1, 'GENDER/AGE (Q1)');
                renderSpiderwebGenderChart('intDemoChartQ2', q2, 'GENDER/AGE (Q2)');
                renderInternalStructuralCharts(q1, q2); 
            } else {
                renderSpiderwebGenderChart('extDemoChartQ1', q1, 'MARKET (Q1)');
                renderSpiderwebGenderChart('extDemoChartQ2', q2, 'MARKET (Q2)');
                renderExternalStructuralCharts(q1, q2);
            }
        }

        function calculateAgeBracketsByGender(dataPool) {
            let totalCount = dataPool.length || 1;
            let result = { male: [0,0,0,0,0], female: [0,0,0,0,0] };
            dataPool.forEach(item => {
                let age = item.age || 0;
                let idx = age <= 19 ? 0 : age <= 39 ? 1 : age <= 59 ? 2 : age <= 79 ? 3 : 4;
                if (item.gender === 'Male') result.male[idx]++; else result.female[idx]++;
            });
            return {
                male: result.male.map(v => Math.round((v / totalCount) * 100)),
                female: result.female.map(v => Math.round((v / totalCount) * 100))
            };
        }

        function renderSpiderwebGenderChart(containerId, dataset, titleText) {
            const percentages = calculateAgeBracketsByGender(dataset);
            Highcharts.chart(containerId, Highcharts.merge(darkThemeBase, {
                chart: { polar: true, type: 'line', height: 240 },
                title: { text: titleText },
                pane: { size: '80%' },
                xAxis: { categories: ['0-19', '20-39', '40-59', '60-79', '80+'], tickmarkPlacement: 'on', lineWidth: 0 },
                yAxis: { gridLineInterpolation: 'polygon', min: 0, max: 50 },
                series: [
                    { name: 'Female', data: percentages.female, color: '#ff1493' },
                    { name: 'Male', data: percentages.male, color: '#00bfff' }
                ]
            }));
        }

        function renderInternalStructuralCharts(q1, q2) {
            // Simplified for brevity
            Highcharts.chart('intLocChart', Highcharts.merge(darkThemeBase, { title: { text: 'TRAFFIC' }, series: [{ data: [10, 20] }] }));
            Highcharts.chart('intSentimentChart', Highcharts.merge(darkThemeBase, { title: { text: 'SENTIMENT' }, series: [{ type: 'pie', data: [10, 20] }] }));
        }

        function renderExternalStructuralCharts(q1, q2) {
            Highcharts.chart('extLocChart', Highcharts.merge(darkThemeBase, { title: { text: 'OUTREACH' }, series: [{ data: [5, 15] }] }));
            Highcharts.chart('extBalanceChart', Highcharts.merge(darkThemeBase, { title: { text: 'CONVERSION' }, series: [{ type: 'pie', data: [30, 10] }] }));
        }
    </script>
</body>
</html>
