<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHMC | Advanced Cross-Quarter Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- Core Highcharts + Dependent Modules -->
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/pictorial.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .highcharts-container { border-radius: 1.5rem !important; overflow: visible !important; }
    </style>
</head>
<body class="bg-[#0f172a] font-sans text-slate-100 min-h-screen">

    <!-- NAVIGATION HUB -->
    <nav class="bg-[#1e293b]/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-800 p-4 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-8">
                <h1 class="font-black text-indigo-400 tracking-tighter text-xl uppercase italic">PHMC</h1>
                <div class="flex gap-6">
                    <a href="survey.html" class="text-sm font-bold text-slate-400 hover:text-indigo-400 transition uppercase tracking-widest">Internal</a>
                    <a href="external_survey.html" class="text-sm font-bold text-slate-400 hover:text-rose-400 transition uppercase tracking-widest">External</a>
                    <a href="reports.html" class="text-sm font-bold text-indigo-400 border-b-2 border-indigo-400 uppercase tracking-widest">Reports</a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right mr-2">
                    <span id="userDisplay" class="text-[10px] font-black text-slate-400 block uppercase tracking-widest">...</span>
                    <span class="text-[8px] font-bold text-emerald-400 block bg-emerald-500/10 px-2 py-0.5 rounded-md mt-0.5 uppercase tracking-wide border border-emerald-500/20">Comparative Quarter Mode</span>
                </div>
                <button id="logoutBtn" onclick="supabaseClient.auth.signOut().then(() => window.location.href='index.html')" class="hidden bg-slate-800 text-[10px] font-black px-4 py-2 rounded-full hover:bg-rose-950 hover:text-rose-400 border border-slate-700 transition uppercase tracking-widest">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-8 space-y-8">
        
        <!-- DASHBOARD CONTROL MODIFIERS + RECTANGLE SCORECARD CONTAINER -->
        <div class="flex flex-col md:flex-row justify-between items-stretch gap-6">
            <div class="bg-[#1e293b] p-2 rounded-2xl flex items-center gap-1 border border-slate-800 self-start">
                <button onclick="switchDashboard('internal')" id="btn-internal" class="px-10 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-indigo-600 shadow-md text-white">Internal Data</button>
                <button onclick="switchDashboard('external')" id="btn-external" class="px-10 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-200">External Market</button>
            </div>
            
            <!-- TOTALS MATRIX CARD -->
            <div class="bg-[#1e293b] border border-slate-800 rounded-2xl p-4 flex-1 flex flex-col sm:flex-row justify-between items-center gap-4 px-8 shadow-2xl">
                <div class="flex flex-col">
                    <span class="text-[9px] font-black tracking-widest text-slate-400 uppercase">Total Submissions Matrix</span>
                    <div class="flex items-baseline gap-2">
                        <span id="txt-total-pool" class="text-3xl font-black text-white italic">--</span>
                        <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Responses Pool</span>
                    </div>
                </div>
                <div class="flex gap-4 w-full sm:w-auto">
                    <div class="bg-slate-900/60 border border-slate-800 rounded-xl p-2 px-4 text-center min-w-[100px] flex-1 sm:flex-initial">
                        <span class="text-[9px] font-black text-indigo-400 block tracking-widest uppercase">Q1 March</span>
                        <span id="txt-q1-count" class="text-xl font-black text-white">--</span>
                    </div>
                    <div class="bg-slate-900/60 border border-slate-800 rounded-xl p-2 px-4 text-center min-w-[100px] flex-1 sm:flex-initial">
                        <span id="lbl-q2-title" class="text-[9px] font-black text-teal-400 block tracking-widest uppercase">Q2 June/July</span>
                        <span id="txt-q2-count" class="text-xl font-black text-white">--</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- TRI-ANIMATED SATURATION MATRIX SECTION -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-[#1e293b] border border-slate-800 rounded-3xl p-4 shadow-xl relative min-h-[340px]">
                <div id="satChartOverall" class="w-full h-full"></div>
                <div class="absolute bottom-4 right-6 bg-transparent z-10">
                    <table class="text-[11px] font-semibold border-none space-y-1">
                        <tr class="text-emerald-400"><td class="pr-2 text-sm">😊</td><td class="font-bold uppercase tracking-wider">Sat:</td><td id="tbl-ov-sat" class="text-right pl-3 font-mono">--</td></tr>
                        <tr class="text-rose-500"><td class="pr-2 text-sm">😡</td><td class="font-bold uppercase tracking-wider">Unsat:</td><td id="tbl-ov-unsat" class="text-right pl-3 font-mono">--</td></tr>
                    </table>
                </div>
            </div>
            <div class="bg-[#1e293b] border border-slate-800 rounded-3xl p-4 shadow-xl relative min-h-[340px]">
                <div id="satChartQ1" class="w-full h-full"></div>
                <div class="absolute bottom-4 right-6 bg-transparent z-10">
                    <table class="text-[11px] font-semibold border-none space-y-1">
                        <tr class="text-emerald-400"><td class="pr-2 text-sm">😊</td><td class="font-bold uppercase tracking-wider">Sat:</td><td id="tbl-q1-sat" class="text-right pl-3 font-mono">--</td></tr>
                        <tr class="text-rose-500"><td class="pr-2 text-sm">😡</td><td class="font-bold uppercase tracking-wider">Unsat:</td><td id="tbl-q1-unsat" class="text-right pl-3 font-mono">--</td></tr>
                    </table>
                </div>
            </div>
            <div class="bg-[#1e293b] border border-slate-800 rounded-3xl p-4 shadow-xl relative min-h-[340px]">
                <div id="satChartQ2" class="w-full h-full"></div>
                <div class="absolute bottom-4 right-6 bg-transparent z-10">
                    <table class="text-[11px] font-semibold border-none space-y-1">
                        <tr class="text-emerald-400"><td class="pr-2 text-sm">😊</td><td class="font-bold uppercase tracking-wider">Sat:</td><td id="tbl-q2-sat" class="text-right pl-3 font-mono">--</td></tr>
                        <tr class="text-rose-500"><td class="pr-2 text-sm">😡</td><td class="font-bold uppercase tracking-wider">Unsat:</td><td id="tbl-q2-unsat" class="text-right pl-3 font-mono">--</td></tr>
                    </table>
                </div>
            </div>
        </div>

        <!-- ==================== INTERNAL DATA VIEW ==================== -->
        <div id="section-internal" class="tab-content active space-y-6">
            <div class="bg-[#1e293b] shadow-xl rounded-3xl p-6 border border-slate-800 w-full overflow-visible">
                 <div id="intPictorialChart" class="w-full h-[340px]"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-[#1e293b] shadow-xl rounded-3xl p-6 border border-slate-800" id="intLocChart"></div>
                <div class="bg-[#1e293b] shadow-xl rounded-3xl p-6 border border-slate-800" id="intSentimentChart"></div>
            </div>
        </div>

        <!-- ==================== EXTERNAL MARKET VIEW ==================== -->
        <div id="section-external" class="tab-content space-y-6">
            <div class="bg-[#1e293b] shadow-xl rounded-3xl p-6 border border-slate-800 w-full overflow-visible">
                 <div id="extPictorialChart" class="w-full h-[340px]"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-[#1e293b] shadow-xl rounded-3xl p-6 border border-slate-800" id="extLocChart"></div>
                <div class="bg-[#1e293b] shadow-xl rounded-3xl p-6 border border-slate-800" id="extBalanceChart"></div>
            </div>
        </div>

    </main>

    <script>
        const SB_URL = 'https://osfwbhcqibhtobaoojrv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZndiaGNxaWJodG9iYW9vanJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxMDU3MzksImV4cCI6MjA4NTY4MTczOX0.2NNaOhHfXMsYVWrBkJ1gudU4l0in35WU4bT4UgzkvlA';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        const Q1_START = '2026-03-01T00:00:00.000Z', Q1_END = '2026-03-31T23:59:59.999Z';
        const Q2_START = '2026-06-01T00:00:00.000Z', Q2_END = '2026-07-31T23:59:59.999Z';

        let cachedInternal = { q1: [], q2: [] }, cachedExternal = { q1: [], q2: [] };

        // Standard highcharts configurations
        const darkThemeBase = {
            chart: { backgroundColor: '#1e293b', style: { fontFamily: 'Inter, sans-serif' } },
            title: { style: { color: '#94a3b8', fontSize: '10px', fontWeight: '900', letterSpacing: '0.25em' }, align: 'left' },
            xAxis: { gridLineColor: '#334155', lineColor: '#334155', tickColor: '#334155', labels: { style: { color: '#94a3b8' } } },
            yAxis: { gridLineColor: '#334155', lineColor: '#334155', title: { text: null }, labels: { style: { color: '#94a3b8' } } },
            legend: { enabled: false }, exporting: { enabled: false },
            tooltip: { headerFormat: '', pointFormat: '<span style="color:{point.color}">\u25cf</span> {point.name}: <b>{point.percentage:.0f}%</b>' },
            credits: { enabled: false }, accessibility: { point: { valueSuffix: '%' } }
        };

        window.onload = async () => {
            const { data: { user } } = await supabaseClient.auth.getUser();
            document.getElementById('userDisplay').innerText = user ? user.email : "GUEST ANALYST VIEW";
            if (user) document.getElementById('logoutBtn').classList.remove('hidden');
            
            await fetchMetricsDataPipeline();
            switchDashboard('internal'); 
        };

        async function fetchMetricsDataPipeline() {
            const [intQ1, intQ2, extQ1, extQ2] = await Promise.all([
                supabaseClient.from('survey_submissions').select('*').gte('created_at', Q1_START).lte('created_at', Q1_END),
                supabaseClient.from('survey_submissions').select('*').gte('created_at', Q2_START).lte('created_at', Q2_END),
                supabaseClient.from('external_surveys').select('*').gte('created_at', Q1_START).lte('created_at', Q1_END),
                supabaseClient.from('external_surveys').select('*').gte('created_at', Q2_START).lte('created_at', Q2_END)
            ]);
            cachedInternal = { q1: intQ1.data || [], q2: intQ2.data || [] };
            cachedExternal = { q1: extQ1.data || [], q2: extQ2.data || [] };
        }

        function switchDashboard(type) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`section-${type}`).classList.add('active');
            
            const btnInt = document.getElementById('btn-internal'), btnExt = document.getElementById('btn-external');
            const lblQ2 = document.getElementById('lbl-q2-title');
            
            if(type === 'internal') {
                btnInt.className = "px-10 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-indigo-600 shadow-md text-white";
                btnExt.className = "px-10 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-200";
                lblQ2.className = "text-[9px] font-black text-teal-400 block tracking-widest uppercase";
                renderActiveDataset(cachedInternal.q1, cachedInternal.q2, 'internal');
            } else {
                btnExt.className = "px-10 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-rose-600 shadow-md text-white";
                btnInt.className = "px-10 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-200";
                lblQ2.className = "text-[9px] font-black text-rose-400 block tracking-widest uppercase";
                renderActiveDataset(cachedExternal.q1, cachedExternal.q2, 'external');
            }
        }

        function getGenderAgeDistribution(records, genderFilter) {
            let dist = { '0-18': 0, '19-35': 0, '36-50': 0, '51+': 0 };
            records.forEach(r => {
                const rGender = (r.gender || '').toLowerCase();
                if (rGender.startsWith(genderFilter.toLowerCase())) {
                    const age = parseInt(r.age);
                    if (!isNaN(age)) {
                        if (age <= 18) dist['0-18']++;
                        else if (age <= 35) dist['19-35']++;
                        else if (age <= 50) dist['36-50']++;
                        else dist['51+']++;
                    }
                }
            });
            return [dist['0-18'], dist['19-35'], dist['36-50'], dist['51+']];
        }

        function renderActiveDataset(q1, q2, mode) {
            const combinedPool = [...q1, ...q2];
            document.getElementById('txt-total-pool').innerText = combinedPool.length;
            document.getElementById('txt-q1-count').innerText = q1.length;
            document.getElementById('txt-q2-count').innerText = q2.length;

            const isInt = mode === 'internal';
            const conditionCheck = (item) => isInt ? item.experience_rating === 'Positive' : item.has_availed_recently === true;

            const q1Sat = q1.filter(conditionCheck).length, q1Unsat = q1.length - q1Sat;
            const q2Sat = q2.filter(conditionCheck).length, q2Unsat = q2.length - q2Sat;
            const totSat = q1Sat + q2Sat, totUnsat = q1Unsat + q2Unsat;

            document.getElementById('tbl-ov-sat').innerText = totSat;
            document.getElementById('tbl-ov-unsat').innerText = totUnsat;
            document.getElementById('tbl-q1-sat').innerText = q1Sat;
            document.getElementById('tbl-q1-unsat').innerText = q1Unsat;
            document.getElementById('tbl-q2-sat').innerText = q2Sat;
            document.getElementById('tbl-q2-unsat').innerText = q2Unsat;

            const basePieConf = (title, data) => Highcharts.merge(darkThemeBase, {
                title: { text: title },
                plotOptions: {
                    pie: {
                        allowPointSelect: true, borderWidth: 2, borderColor: '#1e293b', cursor: 'pointer', center: ['50%', '42%'], size: '75%',
                        dataLabels: { enabled: false }
                    }
                },
                series: [{ type: 'pie', data: data }]
            });

            Highcharts.chart('satChartOverall', basePieConf('OVERALL SATURATION INDEX', [{ name: 'Satisfied', y: totSat, color: '#22c55e' }, { name: 'Unsatisfied', y: totUnsat, color: '#ef4444' }]));
            Highcharts.chart('satChartQ1', basePieConf('Q1 MARCH BOUNDARY', [{ name: 'Satisfied', y: q1Sat, color: '#22c55e' }, { name: 'Unsatisfied', y: q1Unsat, color: '#ef4444' }]));
            Highcharts.chart('satChartQ2', basePieConf('Q2 JUN/JUL BOUNDARY', [{ name: 'Satisfied', y: q2Sat, color: '#22c55e' }, { name: 'Unsatisfied', y: q2Unsat, color: '#ef4444' }]));

            if (isInt) {
                renderPictorialChart('intPictorialChart', combinedPool, 'INTERNAL DEMOGRAPHIC PROFILE');
                renderInternalStructuralCharts(q1, q2); 
            } else {
                renderPictorialChart('extPictorialChart', combinedPool, 'EXTERNAL DEMOGRAPHIC PROFILE');
                renderExternalStructuralCharts(q1, q2);
            }
        }

        function renderPictorialChart(containerId, combinedPool, titleText) {
            const maleData = getGenderAgeDistribution(combinedPool, 'male');
            const femaleData = getGenderAgeDistribution(combinedPool, 'female');

            const malePath = 'M256,0C114.6,0,0,114.6,0,256s114.6,256,256,256s256-114.6,256-256S397.4,0,256,0z M256,96c35.3,0,64,28.7,64,64s-28.7,64-64,64s-64-28.7-64-64S220.7,96,256,96z M256,416c-61.9,0-116.4-35.1-144-86.4c1.2-42.5,34.7-76.8,76.8-76.8h134.4c42.1,0,75.6,34.3,76.8,76.8C372.4,380.9,317.9,416,256,416z';
            const femalePath = 'M256,0C114.6,0,0,114.6,0,256s114.6,256,256,256s256-114.6,256-256S397.4,0,256,0z M256,96c35.3,0,64,28.7,64,64s-28.7,64-64,64s-64-28.7-64-64S220.7,96,256,96z M380.5,355.5c-7.6,18.5-22.3,33.2-40.8,40.8C312.4,407.4,284.9,412,256,412s-56.4-4.6-83.7-15.7c-18.5-7.6-33.2-22.3-40.8-40.8C120.4,328.3,116,300.7,116,272h280C396,300.7,391.6,328.3,380.5,355.5z';

            Highcharts.chart(containerId, {
                chart: { type: 'pictorial', backgroundColor: 'transparent', height: 320 },
                title: {
                    text: titleText,
                    style: { color: '#94a3b8', fontSize: '10px', fontWeight: '900', letterSpacing: '0.25em' },
                    align: 'left'
                },
                xAxis: {
                    categories: ['0-18 Yrs', '19-35 Yrs', '36-50 Yrs', '51+ Yrs'],
                    lineWidth: 0,
                    labels: { style: { color: '#94a3b8', fontWeight: 'bold', fontSize: '11px' } }
                },
                yAxis: { visible: false },
                
                // LEGEND CENTERED IN THE MIDDLE BREAKDOWN
                legend: {
                    enabled: true,
                    align: 'center',
                    verticalAlign: 'top',
                    layout: 'horizontal',
                    itemStyle: { color: '#94a3b8', fontSize: '10px', fontWeight: 'bold' }
                },
                
                tooltip: {
                    backgroundColor: '#0f172a',
                    borderColor: '#334155',
                    style: { color: '#f8fafc' },
                    headerFormat: '<span style="font-size: 11px">Age Bracket: <b>{point.key}</b></span><br/>',
                    pointFormat: '<span style="color:{point.color}">\u25cf</span> {series.name}: <b>{point.y} respondents</b><br/>'
                },
                credits: { enabled: false },
                exporting: { enabled: false },
                plotOptions: {
                    series: {
                        pointPadding: 0.1,
                        groupPadding: 0.2,
                        dataLabels: {
                            enabled: true,
                            format: '{y}',
                            style: { fontSize: '11px', fontWeight: 'bold', color: '#ffffff', textOutline: 'none' }
                        }
                    }
                },
                series: [{
                    name: 'Men',
                    data: maleData,
                    color: '#38bdf8',
                    paths: [{ definition: malePath }]
                }, {
                    name: 'Women',
                    data: femaleData,
                    color: '#f472b6',
                    paths: [{ definition: femalePath }]
                }]
            });
        }

        function renderInternalStructuralCharts(q1, q2) {
            const processLoc = (arr) => arr.reduce((acc, c) => { acc[c.location] = (acc[c.location] || 0) + 1; return acc; }, {});
            const q1Loc = processLoc(q1), q2Loc = processLoc(q2);
            const allLocs = Array.from(new Set([...Object.keys(q1Loc), ...Object.keys(q2Loc)]));
            Highcharts.chart('intLocChart', Highcharts.merge(darkThemeBase, {
                chart: { type: 'area' }, title: { text: 'REGIONAL PATIENT TRAFFIC' }, xAxis: { categories: allLocs },
                series: [{ name: 'Q1 Base', data: allLocs.map(l => q1Loc[l] || 0), color: '#4f46e5', fillOpacity: 0.1 }, { name: 'Q2 Volume', data: allLocs.map(l => q2Loc[l] || 0), color: '#06b6d4', fillOpacity: 0.3 }]
            }));

            const getSentimentSeries = (arr) => [arr.filter(s => s.experience_rating === 'Positive').length, arr.filter(s => s.experience_rating !== 'Positive').length];
            const q1Sent = getSentimentSeries(q1), q2Sent = getSentimentSeries(q2);
            Highcharts.chart('intSentimentChart', Highcharts.merge(darkThemeBase, {
                chart: { type: 'pie' }, title: { text: 'CROSS-QUARTER VOLUME SPREAD' },
                plotOptions: { pie: { innerSize: '60%', showInLegend: true } },
                series: [{ name: 'Total Volume', data: [{ name: 'Q1 Pos', y: q1Sent[0], color: '#312e81' }, { name: 'Q1 Crit', y: q1Sent[1], color: '#4c1d95' }, { name: 'Q2 Pos', y: q2Sent[0], color: '#10b981' }, { name: 'Q2 Crit', y: q2Sent[1], color: '#f43f5e' }] }]
            }));
        }

        function renderExternalStructuralCharts(q1, q2) {
            const processLoc = (arr) => arr.reduce((acc, c) => { acc[c.location] = (acc[c.location] || 0) + 1; return acc; }, {});
            const q1Loc = processLoc(q1), q2Loc = processLoc(q2);
            const allLocs = Array.from(new Set([...Object.keys(q1Loc), ...Object.keys(q2Loc)]));
            Highcharts.chart('extLocChart', Highcharts.merge(darkThemeBase, {
                chart: { type: 'line' }, title: { text: 'OUTREACH TARGET LOCATIONS' }, xAxis: { categories: allLocs },
                series: [{ name: 'Q1 Active', data: allLocs.map(l => q1Loc[l] || 0), color: '#be123c', dashStyle: 'Dash' }, { name: 'Q2 Active', data: allLocs.map(l => q2Loc[l] || 0), color: '#e11d48' }]
            }));

            const q1Yes = q1.filter(s => s.has_availed_recently).length, q2Yes = q2.filter(s => s.has_availed_recently).length;
            Highcharts.chart('extBalanceChart', Highcharts.merge(darkThemeBase, {
                chart: { type: 'pie' }, title: { text: 'CONVERSION VARIATION RATIOS' },
                plotOptions: { pie: { innerSize: '70%', showInLegend: true } },
                series: [{ name: 'Respondents', data: [{ name: 'Q1 Engaged', y: q1Yes, color: '#881337' }, { name: 'Q1 Passive', y: q1.length - q1Yes, color: '#334155' }, { name: 'Q2 Engaged', y: q2Yes, color: '#e11d48' }, { name: 'Q2 Passive', y: q2.length - q2Yes, color: '#475569' }] }]
            }));
        }
    </script>
</body>
</html>
