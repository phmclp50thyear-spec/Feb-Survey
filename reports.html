<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHMC | Analytics Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.11.0/dist/pptxgen.bundle.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #a1a1a1; border-radius: 3px; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .feedback-canvas {
            position: relative;
            height: 600px;
            width: 100%;
            background: #ffffff;
            overflow: hidden;
            border: 2px solid #e2e8f0;
            border-radius: 2.5rem;
        }
        .feedback-item {
            position: absolute;
            font-weight: 900;
            text-transform: uppercase;
            white-space: nowrap;
            transition: opacity 0.5s ease;
            line-height: 1;
        }
        
        .center-hub {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            background: white;
            color: #6366f1;
            width: 180px; height: 180px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-radius: 999px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.08);
            border: 2px solid #f1f5f9;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen pb-20">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 p-4 shadow-sm no-print">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-8">
                <h1 class="font-black text-indigo-600 tracking-tighter text-xl uppercase italic">PHMC</h1>
                <div class="bg-slate-100 p-1 rounded-xl flex gap-1">
                    <button onclick="switchDashboard('internal')" id="tab-int" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest bg-white shadow-sm text-indigo-600">Internal</button>
                    <button onclick="switchDashboard('external')" id="tab-ext" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest text-slate-400">External</button>
                </div>
            </div>
            <button onclick="exportToPPT()" class="bg-orange-500 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-slate-900 transition flex items-center gap-2">
                <span>Export PowerPoint</span>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-12">
        <div id="section-internal" class="tab-content active space-y-10">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-l-slate-400">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Submissions</p>
                    <h3 id="totalCount" class="text-3xl font-black italic">--</h3>
                </div>
                <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-l-emerald-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Satisfaction</p>
                    <h3 id="posRate" class="text-3xl font-black italic text-emerald-500">--</h3>
                </div>
                <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-l-indigo-600">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Repeat Patients</p>
                    <h3 id="repeatCount" class="text-3xl font-black italic text-indigo-600">--</h3>
                </div>
                <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-l-slate-800">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">New Patients</p>
                    <h3 id="newCount" class="text-3xl font-black italic text-slate-800">--</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white border-2 border-slate-200 rounded-3xl p-8">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6">Age & Gender Distribution</h4>
                    <div class="chart-container"><canvas id="demoChart"></canvas></div>
                </div>
                <div class="bg-white border-2 border-slate-200 rounded-3xl p-8">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6">Occupation Mix</h4>
                    <div class="chart-container"><canvas id="occChart"></canvas></div>
                </div>
            </div>
        </div>

        <div id="section-external" class="tab-content space-y-10">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-rose-400">
                    <h3 id="extTotalCount" class="text-3xl font-black italic">--</h3>
                </div>
            </div>
        </div>

        <section class="pt-10 border-t-2 border-slate-200">
            <div class="feedback-canvas shadow-3xl" id="canvas">
                <div class="center-hub">
                    <h2 class="text-2xl font-black uppercase italic text-indigo-600">PHMC</h2>
                </div>
                <div id="feedbackWrapper" class="w-full h-full relative p-8"></div>
            </div>
        </section>
    </main>

    <script>
        const SB_URL = 'https://osfwbhcqibhtobaoojrv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZndiaGNxaWJodG9iYW9vanJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxMDU3MzksImV4cCI6MjA4NTY4MTczOX0.2NNaOhHfXMsYVWrBkJ1gudU4l0in35WU4bT4UgzkvlA';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let currentData = [];

        window.onload = async () => { fetchInternal(); };

        async function fetchInternal() {
            const { data } = await supabaseClient.from('survey_submissions').select('*');
            if (!data) return;
            currentData = data;
            document.getElementById('totalCount').innerText = data.length;
            renderInternalCharts(data);
            processAndRenderScattered(data);
        }

        function exportToPPT() {
            let pptx = new PptxGenJS();
            pptx.layout = 'LAYOUT_WIDE';

            // SLIDE 1: OVERVIEW
            let s1 = pptx.addSlide();
            s1.addText("PHMC ANALYTICS REPORT", { x: 0.5, y: 0.5, fontSize: 24, bold: true, color: '4F46E5' });
            s1.addText(`Total Submissions: ${document.getElementById('totalCount').innerText}`, { x: 0.5, y: 1.5, fontSize: 18 });
            s1.addText(`Satisfaction Rate: ${document.getElementById('posRate')?.innerText || 'N/A'}`, { x: 0.5, y: 2.0, fontSize: 18 });

            // SLIDE 2: CHARTS
            let s2 = pptx.addSlide();
            s2.addText("OPERATIONAL INSIGHTS", { x: 0.5, y: 0.3, fontSize: 20, bold: true });
            const demoImg = document.getElementById('demoChart').toDataURL("image/png");
            s2.addImage({ data: demoImg, x: 0.5, y: 1, w: 4.5, h: 3 });
            const occImg = document.getElementById('occChart').toDataURL("image/png");
            s2.addImage({ data: occImg, x: 5.2, y: 1, w: 4.5, h: 3 });

            // SLIDE 3: FEEDBACK HUB (Scattered)
            let s3 = pptx.addSlide();
            s3.addText("PATIENT VOICE HUB", { x: 0.5, y: 0.3, fontSize: 20, bold: true });
            // Add Center Logo Placeholder
            s3.addShape(pptx.ShapeType.ellipse, { fill: { color: 'FFFFFF' }, line: { color: 'F1F5F9', width: 2 }, x: 4.5, y: 2.2, w: 1.5, h: 1.5 });
            s3.addText("PHMC", { x: 4.5, y: 2.7, w: 1.5, align: 'center', bold: true, fontSize: 20, color: '6366F1' });

            const feedbackItems = document.querySelectorAll('.feedback-item');
            feedbackItems.forEach(el => {
                const rect = el.getBoundingClientRect();
                const parent = el.parentElement.getBoundingClientRect();
                // Map HTML percentage positions to PPT inches (Wide layout is 13.33 x 7.5)
                const relX = (parseFloat(el.style.left) / parent.width) * 12;
                const relY = (parseFloat(el.style.top) / parent.height) * 6;
                
                s3.addText(el.innerText, {
                    x: relX + 0.5,
                    y: relY + 0.8,
                    fontSize: parseInt(el.style.fontSize) * 0.6,
                    color: el.style.color.includes('10b981') ? '10B981' : 'EF4444',
                    bold: true
                });
            });

            pptx.writeFile({ fileName: "PHMC_Patient_Report.pptx" });
        }

        // ... Keep existing processAndRenderScattered and switchDashboard logic ...
        function processAndRenderScattered(data) {
            const wrapper = document.getElementById('feedbackWrapper');
            const canvas = document.getElementById('canvas');
            const CW = canvas.offsetWidth, CH = canvas.offsetHeight;
            const center = { x: CW / 2, y: CH / 2, r: 180 };
            const placedRects = [];
            const feedbackList = data.filter(d => d.feedback_details && d.feedback_details.length > 2).slice(0, 40);

            feedbackList.forEach((item, index) => {
                const span = document.createElement('span');
                span.className = 'feedback-item';
                span.innerText = item.feedback_details;
                span.style.color = item.experience_rating === 'Positive' ? '#10b981' : '#ef4444';
                const sizes = ['12px', '16px', '20px', '28px'];
                span.style.fontSize = sizes[index % sizes.length];
                span.style.opacity = '0';
                wrapper.appendChild(span);
                const w = span.offsetWidth + 20, h = span.offsetHeight + 10;
                let placed = false;
                for (let i = 0; i < 100; i++) {
                    const x = Math.random() * (CW - w - 40) + 20, y = Math.random() * (CH - h - 40) + 20;
                    if (Math.sqrt(Math.pow((x+w/2)-center.x,2) + Math.pow((y+h/2)-center.y,2)) < center.r) continue;
                    const overlap = placedRects.some(r => !(x+w < r.x || x > r.x+r.w || y+h < r.y || y > r.y+r.h));
                    if (!overlap) {
                        span.style.left = `${x}px`; span.style.top = `${y}px`; span.style.opacity = '1';
                        placedRects.push({x, y, w, h}); placed = true; break;
                    }
                }
                if (!placed) span.remove();
            });
        }

        function renderInternalCharts(data) {
            new Chart(document.getElementById('demoChart'), { type: 'bar', data: { labels: ['0-19', '20-39', '40-59', '60-79'], datasets: [{ label: 'Male', data: [5, 12, 8, 3], backgroundColor: '#38bdf8' }, { label: 'Female', data: [8, 15, 10, 5], backgroundColor: '#818cf8' }]}, options: { animation: false, responsive: true, maintainAspectRatio: false }});
            const occ = data.reduce((a,c)=>{a[c.occupation]=(a[c.occupation]||0)+1; return a;},{});
            new Chart(document.getElementById('occChart'), { type: 'pie', data: { labels: Object.keys(occ), datasets: [{ data: Object.values(occ), backgroundColor: ['#6366f1', '#2dd4bf', '#0ea5e9'] }]}, options: { animation: false, responsive: true, maintainAspectRatio: false }});
        }

        function switchDashboard(type) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`section-${type}`).classList.add('active');
        }
    </script>
</body>
</html>
