<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHMC | Advanced Cross-Quarter Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/highcharts-more.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .highcharts-container { border-radius: 1.5rem !important; overflow: visible !important; }
    </style>
</head>
<body class="bg-[#0f172a] font-sans text-slate-100 min-h-screen">
    <nav class="bg-[#1e293b]/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-800 p-4 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-indigo-400 tracking-tighter text-xl uppercase italic">PHMC</h1>
            <div class="flex items-center gap-4">
                <span id="userDisplay" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">...</span>
                <button id="logoutBtn" onclick="supabaseClient.auth.signOut().then(() => window.location.href='index.html')" class="hidden bg-slate-800 text-[10px] font-black px-4 py-2 rounded-full hover:bg-rose-950 hover:text-rose-400 border border-slate-700 transition uppercase tracking-widest">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-8 space-y-8">
        <div class="flex gap-2 bg-[#1e293b] p-2 rounded-2xl w-fit border border-slate-800">
            <button onclick="switchDashboard('internal')" id="btn-internal" class="px-10 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-indigo-600 text-white">Internal Data</button>
            <button onclick="switchDashboard('external')" id="btn-external" class="px-10 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400">External Market</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-[#1e293b] border border-slate-800 rounded-3xl p-4 min-h-[340px]"><div id="satChartOverall" class="w-full h-full"></div></div>
            <div class="bg-[#1e293b] border border-slate-800 rounded-3xl p-4 min-h-[340px]"><div id="satChartQ1" class="w-full h-full"></div></div>
            <div class="bg-[#1e293b] border border-slate-800 rounded-3xl p-4 min-h-[340px]"><div id="satChartQ2" class="w-full h-full"></div></div>
        </div>

        <div id="section-internal" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-800"><div id="intDemoChartQ1" class="w-full h-[300px]"></div></div>
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-800"><div id="intDemoChartQ2" class="w-full h-[300px]"></div></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-800" id="intLocChart"></div>
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-800" id="intSentimentChart"></div>
            </div>
        </div>

        <div id="section-external" class="tab-content space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-800"><div id="extDemoChartQ1" class="w-full h-[300px]"></div></div>
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-800"><div id="extDemoChartQ2" class="w-full h-[300px]"></div></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-800" id="extLocChart"></div>
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-800" id="extBalanceChart"></div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://osfwbhcqibhtobaoojrv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZndiaGNxaWJodG9iYW9vanJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxMDU3MzksImV4cCI6MjA4NTY4MTczOX0.2NNaOhHfXMsYVWrBkJ1gudU4l0in35WU4bT4UgzkvlA';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        // --- PIE FAN ANIMATION PLUGIN ---
        (function (H) {
            H.seriesTypes.pie.prototype.animate = function (init) {
                const series = this, chart = series.chart, points = series.points, { animation } = series.options, { startAngleRad } = series;
                function fanAnimate(point, startAngleRad) {
                    const graphic = point.graphic, args = point.shapeArgs;
                    if (graphic && args) {
                        graphic.attr({ start: startAngleRad, end: startAngleRad, opacity: 1 })
                            .animate({ start: args.start, end: args.end }, { duration: animation.duration / points.length }, function () {
                                if (points[point.index + 1]) { fanAnimate(points[point.index + 1], args.end); }
                            });
                    }
                }
                if (init) { points.forEach(point => { point.opacity = 0; }); } else { fanAnimate(points[0], startAngleRad); }
            };
        }(Highcharts));

        const darkThemeBase = {
            chart: { backgroundColor: '#1e293b', style: { fontFamily: 'Inter, sans-serif' } },
            title: { style: { color: '#94a3b8', fontSize: '10px', fontWeight: '900', letterSpacing: '0.25em' }, align: 'left' },
            credits: { enabled: false }, exporting: { enabled: false }
        };

        async function fetchMetricsDataPipeline() {
            // Data logic remains same as per your original structure
            const Q1_START = '2026-03-01T00:00:00.000Z', Q1_END = '2026-03-31T23:59:59.999Z';
            const Q2_START = '2026-06-01T00:00:00.000Z', Q2_END = '2026-07-31T23:59:59.999Z';
            const [intQ1, intQ2, extQ1, extQ2] = await Promise.all([
                supabaseClient.from('survey_submissions').select('*').gte('created_at', Q1_START).lte('created_at', Q1_END),
                supabaseClient.from('survey_submissions').select('*').gte('created_at', Q2_START).lte('created_at', Q2_END),
                supabaseClient.from('external_surveys').select('*').gte('created_at', Q1_START).lte('created_at', Q1_END),
                supabaseClient.from('external_surveys').select('*').gte('created_at', Q2_START).lte('created_at', Q2_END)
            ]);
            return { int: { q1: intQ1.data || [], q2: intQ2.data || [] }, ext: { q1: extQ1.data || [], q2: extQ2.data || [] } };
        }

        async function initDashboard() {
            const data = await fetchMetricsDataPipeline();
            window.appData = data;
            switchDashboard('internal');
        }

        function switchDashboard(type) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`section-${type}`).classList.add('active');
            const d = type === 'internal' ? appData.int : appData.ext;
            renderAllCharts(d.q1, d.q2, type);
        }

        function renderRadarDemographicsChart(containerId, dataset, titleText) {
            const total = dataset.length || 1;
            let m = [0,0,0,0,0], f = [0,0,0,0,0];
            dataset.forEach(i => {
                let idx = i.age <= 19 ? 0 : i.age <= 39 ? 1 : i.age <= 59 ? 2 : i.age <= 79 ? 3 : 4;
                i.gender === 'Male' ? m[idx]++ : f[idx]++;
            });

            Highcharts.chart(containerId, Highcharts.merge(darkThemeBase, {
                chart: { polar: true, type: 'area' },
                title: { text: titleText },
                pane: { size: '80%' },
                xAxis: { categories: ['0-19', '20-39', '40-59', '60-79', '80+'], tickmarkPlacement: 'on', lineWidth: 0 },
                yAxis: { gridLineInterpolation: 'polygon', lineWidth: 0, min: 0 },
                series: [
                    { name: 'Female', data: f.map(v => Math.round((v/total)*100)), color: '#ff1493', pointPlacement: 'on' },
                    { name: 'Male', data: m.map(v => Math.round((v/total)*100)), color: '#00bfff', pointPlacement: 'on' }
                ]
            }));
        }

        function renderAllCharts(q1, q2, mode) {
            // Re-render your Pie and Radar charts here
            renderRadarDemographicsChart(mode === 'internal' ? 'intDemoChartQ1' : 'extDemoChartQ1', q1, 'QUARTER 1 DEMOGRAPHICS');
            renderRadarDemographicsChart(mode === 'internal' ? 'intDemoChartQ2' : 'extDemoChartQ2', q2, 'QUARTER 2 DEMOGRAPHICS');
            // ... add your structural chart calls here
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
