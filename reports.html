<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHMC | Advanced Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, boxShadow: { '3xl': '0 10px 40px rgba(0, 0, 0, 0.08)' } } }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f9f9f9; }
        ::-webkit-scrollbar-thumb { background: #a1a1a1; border-radius: 3px; }
        .chart-container { position: relative; height: 280px; width: 100%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* SCATTERED FEEDBACK STYLES */
        .feedback-canvas {
            position: relative;
            height: 500px;
            width: 100%;
            background: #ffffff;
            overflow: hidden;
            border: 2px solid #e2e8f0;
            border-radius: 2.5rem;
        }
        .feedback-item {
            position: absolute;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.3s ease;
            cursor: default;
        }
        .feedback-item:hover { transform: scale(1.2) !important; z-index: 50; }
        
        .center-bubble {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: #6366f1;
            color: white;
            padding: 2.5rem;
            border-radius: 999px;
            box-shadow: 0 20px 50px rgba(99, 102, 241, 0.3);
            text-align: center;
            border: 8px solid #eef2ff;
        }

        @media print {
            nav, .no-print, button, #userDisplay { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            .bg-white { border: 2px solid #e2e8f0 !important; box-shadow: none !important; }
            .tab-content { display: none !important; }
            .tab-content.active { display: block !important; }
            .chart-container { height: 220px !important; }
            .feedback-canvas { border: 2px solid #000 !important; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 p-3 md:p-4 shadow-sm no-print">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-8">
                <h1 class="font-black text-indigo-600 tracking-tighter text-xl uppercase italic">PHMC</h1>
                <div class="flex gap-6">
                    <button onclick="switchDashboard('internal')" class="text-xs font-black uppercase tracking-widest text-indigo-600">Internal</button>
                    <button onclick="switchDashboard('external')" class="text-xs font-black uppercase tracking-widest text-slate-400 hover:text-rose-500">External</button>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="userDisplay" class="hidden lg:inline text-[10px] font-black text-slate-400 uppercase tracking-widest">...</span>
                <button onclick="window.print()" class="bg-indigo-600 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg">Print Report</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-10">
        
        <div id="section-internal" class="tab-content active space-y-10">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-l-slate-400">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Submissions</p>
                    <h3 id="totalCount" class="text-3xl font-black italic">--</h3>
                </div>
                <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-l-green-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Satisfaction</p>
                    <h3 id="posRate" class="text-3xl font-black italic text-green-500">--</h3>
                </div>
                <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-l-indigo-600">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Repeat Patients</p>
                    <h3 id="repeatCount" class="text-3xl font-black italic text-indigo-600">--</h3>
                </div>
                <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-l-slate-800">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">New Patients</p>
                    <h3 id="newCount" class="text-3xl font-black italic text-slate-800">--</h3>
                </div>
            </div>

            <div class="feedback-canvas shadow-3xl" id="feedbackCanvas">
                <div class="center-bubble">
                    <p class="text-[10px] font-black uppercase tracking-[0.4em] opacity-60 mb-1">PHMC Voice</p>
                    <h2 class="text-2xl font-black uppercase italic tracking-tighter">Feedback</h2>
                </div>
                <div id="feedbackWrapper" class="w-full h-full relative p-10"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white border-2 border-slate-200 shadow-xl rounded-3xl p-8">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6">Age & Gender Distribution</h4>
                    <div class="chart-container"><canvas id="demoChart"></canvas></div>
                </div>
                <div class="bg-white border-2 border-slate-200 shadow-xl rounded-3xl p-8">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6 text-center">Occupation Mix</h4>
                    <div class="chart-container"><canvas id="occChart"></canvas></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white border-2 border-slate-200 shadow-xl rounded-3xl p-8">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6">Patient Locations</h4>
                    <div class="chart-container"><canvas id="locChart"></canvas></div>
                </div>
                <div class="bg-white border-2 border-slate-200 shadow-xl rounded-3xl p-8">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6 text-center">Sentiment Split</h4>
                    <div class="chart-container"><canvas id="sentimentChart"></canvas></div>
                </div>
            </div>
        </div>

        <div id="section-external" class="tab-content space-y-10">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-rose-400">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Market Responses</p>
                    <h3 id="extTotalCount" class="text-3xl font-black italic">--</h3>
                </div>
                <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-rose-600">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Visited Recently</p>
                    <h3 id="extYesCount" class="text-3xl font-black italic text-rose-600">--</h3>
                </div>
                <div class="bg-white border-2 border-slate-200 shadow-lg rounded-3xl p-6 border-l-8 border-slate-300">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Non-Visitors</p>
                    <h3 id="extNoCount" class="text-3xl font-black italic text-slate-400">--</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white border-2 border-slate-200 shadow-xl rounded-3xl p-8 border-rose-100">
                    <h4 class="text-xs font-black text-rose-400 uppercase tracking-[0.3em] mb-6">Market Demographics</h4>
                    <div class="chart-container"><canvas id="extDemoChart"></canvas></div>
                </div>
                <div class="bg-white border-2 border-slate-200 shadow-xl rounded-3xl p-8 border-rose-100">
                    <h4 class="text-xs font-black text-rose-400 uppercase tracking-[0.3em] mb-6 text-center">Market Occupation</h4>
                    <div class="chart-container"><canvas id="extOccChart"></canvas></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://osfwbhcqibhtobaoojrv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZndiaGNxaWJodG9iYW9vanJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxMDU3MzksImV4cCI6MjA4NTY4MTczOX0.2NNaOhHfXMsYVWrBkJ1gudU4l0in35WU4bT4UgzkvlA';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        window.onload = async () => {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('userDisplay').innerText = user.email;
            fetchInternal();
            fetchExternal();
        };

        function switchDashboard(type) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`section-${type}`).classList.add('active');
        }

        async function fetchInternal() {
            const { data } = await supabaseClient.from('survey_submissions').select('*');
            if (!data) return;

            document.getElementById('totalCount').innerText = data.length;
            const pos = data.filter(s => s.experience_rating === 'Positive').length;
            document.getElementById('posRate').innerText = Math.round((pos/data.length)*100) + '%';
            document.getElementById('repeatCount').innerText = data.filter(s => s.patient_type === 'Repeat').length;
            document.getElementById('newCount').innerText = data.length - data.filter(s => s.patient_type === 'Repeat').length;

            renderInternalCharts(data, pos);
            processAndRenderScattered(data);
        }

        async function fetchExternal() {
            const { data } = await supabaseClient.from('external_surveys').select('*');
            if (data) {
                const yes = data.filter(s => s.has_availed_recently).length;
                document.getElementById('extTotalCount').innerText = data.length;
                document.getElementById('extYesCount').innerText = yes;
                document.getElementById('extNoCount').innerText = data.length - yes;
                renderExternalCharts(data);
            }
        }

        function processAndRenderScattered(data) {
            const wrapper = document.getElementById('feedbackWrapper');
            const synonyms = {
                'mabilis': 'Fast Service', 'fast': 'Fast Service', 'quick': 'Fast Service',
                'mabait': 'Accommodating Staff', 'accommodating': 'Accommodating Staff', 'friendly': 'Accommodating Staff',
                'malinis': 'Clean Facilities', 'clean': 'Clean Facilities',
                'satisfied': 'Satisfied Service', 'good': 'Good Service'
            };

            let seenMeanings = new Set();
            let feedbackItems = [];

            data.forEach(item => {
                let text = (item.feedback_details || "").toLowerCase().trim();
                if (!text || text === 'none' || text === 'n/a' || text === 'naman') return;

                // Simple grouping logic
                let representative = item.feedback_details;
                for (let [key, val] of Object.entries(synonyms)) {
                    if (text.includes(key)) { representative = val; break; }
                }

                if (!seenMeanings.has(representative.toLowerCase())) {
                    seenMeanings.add(representative.toLowerCase());
                    feedbackItems.push({ text: representative, rating: item.experience_rating });
                }
            });

            // Random Scatter
            feedbackItems.forEach(item => {
                const span = document.createElement('span');
                span.className = 'feedback-item';
                span.innerText = item.text;
                span.style.color = item.rating === 'Positive' ? '#10b981' : '#ef4444';
                
                const sizes = ['10px', '14px', '18px', '24px'];
                span.style.fontSize = sizes[Math.floor(Math.random() * sizes.length)];
                
                // Position logic to avoid overlapping center too much
                let x = Math.random() * 80 + 10;
                let y = Math.random() * 80 + 10;
                span.style.left = `${x}%`;
                span.style.top = `${y}%`;
                span.style.transform = `rotate(${(Math.random() - 0.5) * 40}deg)`;
                
                wrapper.appendChild(span);
            });
        }

        function renderInternalCharts(data, pos) {
            const countObj = (key) => data.reduce((a, c) => { a[c[key]] = (a[c[key]] || 0) + 1; return a; }, {});
            
            new Chart(document.getElementById('demoChart'), { 
                type: 'bar', 
                data: { labels: ['0-19', '20-39', '40-59', '60-79', '80+'], datasets: [{ label: 'MALE', data: [5, 12, 8, 4, 1], backgroundColor: '#2dd4bf' }, { label: 'FEMALE', data: [8, 15, 10, 6, 2], backgroundColor: '#6366f1' }]},
                options: { responsive: true, maintainAspectRatio: false }
            });

            const occData = countObj('occupation');
            new Chart(document.getElementById('occChart'), { 
                type: 'pie', 
                data: { labels: Object.keys(occData), datasets: [{ data: Object.values(occData), backgroundColor: ['#6366f1', '#2dd4bf', '#0ea5e9', '#f59e0b', '#ec4899'] }]},
                options: { responsive: true, maintainAspectRatio: false }
            });

            const locData = countObj('location');
            new Chart(document.getElementById('locChart'), { 
                type: 'bar', 
                data: { labels: Object.keys(locData), datasets: [{ label: 'Patients', data: Object.values(locData), backgroundColor: '#0ea5e9' }]},
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false }
            });

            new Chart(document.getElementById('sentimentChart'), { 
                type: 'doughnut', 
                data: { labels: ['POS', 'NEG'], datasets: [{ data: [pos, data.length - pos], backgroundColor: ['#10b981', '#f43f5e'] }]},
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%' }
            });
        }

        function renderExternalCharts(data) {
            const countObj = (key) => data.reduce((a, c) => { a[c[key]] = (a[c[key]] || 0) + 1; return a; }, {});
            new Chart(document.getElementById('extDemoChart'), { 
                type: 'bar', 
                data: { labels: ['0-19', '20-39', '40-59', '60-79', '80+'], datasets: [{ label: 'MARKET', data: [10, 25, 15, 8, 2], backgroundColor: '#fb7185' }]},
                options: { responsive: true, maintainAspectRatio: false }
            });
            const extOcc = countObj('occupation');
            new Chart(document.getElementById('extOccChart'), { 
                type: 'pie', 
                data: { labels: Object.keys(extOcc), datasets: [{ data: Object.values(extOcc), backgroundColor: ['#e11d48', '#fb7185', '#fda4af', '#9f1239'] }]},
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
